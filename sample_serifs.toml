[server]
# サーバー監視の通知
cpu = "サーバーの負荷が高そうです。大丈夫でしょうか...？"

[maze]
# 迷路生成の通知
post = "今日の迷路です！ #AiMaze"
foryou = "描きました！"

[chart]
# チャート生成の通知
post = "インスタンスの投稿数です！"
foryou = "描きました！"

[checkCustomEmojis]
# カスタム絵文字チェックの通知
# 変数: {server_name}, {num}
post = "{server_name}に{num}件の絵文字が追加されました！"
# 変数: {emoji}
emojiPost = ":{emoji}:\n(`{emoji}`) #AddCustomEmojis"
# 変数: {server_name}, {num}, {text}
postOnce = "{server_name}に{num}件の絵文字が追加されました！\n{text} #AddCustomEmojis"
# 変数: {emoji}
emojiOnce = ":{emoji}:(`{emoji}`)"

[aichat]
# AIチャットへの反応
# 変数: {type}
nothing = "あぅ... {type}のAPIキーが登録されてないみたいです"
# 変数: {type}, {errorCode}, {errorMessage}
error = "うぇ...{type}でエラーが発生しちゃったみたいです。\nエラーコード: {errorCode}\nエラーメッセージ: {errorMessage}"
# 変数: {text}
post = "{text} #aichat"

[aichat.autoNoteError]
# AI自動投稿エラー時のメッセージ候補（配列形式）
values = [
  "ん〜ぅ〜はぁ...それっぽい独り言を考えたけど、困っちゃいました...",
  "うぅ...独り言を考えたけど、なんだか変になっちゃいました..."
]

[follow.success]
# フォロー成功時の通知
# 変数: {userDisplay}
follow = "✅ {userDisplay}をフォローしました"
unfollow = "✅ {userDisplay}のフォロー解除しました"

[follow.error]
# フォローエラー時の通知
# 変数: {userDisplay}
userNotFound = "⚠️ ユーザー {userDisplay} が見つかりません"
# 変数: {userDisplay}, {action}
apiFailed = "❌ {userDisplay}の{action}に失敗しました"
permissionDenied = "どなたさまですか？"

[sleepReport]
# 長時間無反応（睡眠）後の報告
# 変数: {hours}
report = "んぅ、{hours}時間くらい寝ちゃってたみたいです"
reportUtatane = "ん... うたた寝しちゃってました"

[noting]
# notes は配列置換（マージではなく完全置換）されます
notes = [
  "元のメモ1",
  "元のメモ2"
]
# 変数: {item}
want = "{item}、欲しいなぁ..."
see = "お散歩していたら、道に{item}が落ちているのを見たんです！"
expire = "気づいたら、{item}の賞味期限が切れてました…"

[weather]
