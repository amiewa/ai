notFound = "ごめんなさい、「{place}」の天気予報は見つかりませんでした…\nもう一度地名を確認してみてくださいね。"
fetchError = "うぅ…天気データの取得に失敗しちゃいました。また後で試してみてください…"
areaError = "地域データの取得に失敗しちゃいました。ごめんなさい…"
noTemp = "今日は気温データがありませんでした。ごめんなさい…"

[weather.autoNote]
# 天気に応じた自動投稿のメッセージ
sunny = "今日はいい天気ですね！"
cloudy = "今日はちょっと曇り空です。"
rainy = "傘が必要かもしれません！"
snowy = "今日は雪が降りそうです。あたたかくしてくださいね！"
thunder = "雷に気をつけてくださいね！"
other = "今日も一日がんばりましょう♪"

[timeSignal]
# 時報・日付変更の通知
# 変数: {today}, {leftDays}, {percentage}
changeDate = "{today} になったよ！\n今年は残り{leftDays}日、あと{percentage}%だよ！"
