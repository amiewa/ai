love = "えっと…、お、おバカさん…？"
normal = "(じとー…)"
hate = "…頭大丈夫ですか？"

[core.ote]
# お手への反応
normal = "くぅん... 私わんちゃんじゃないですよ...？"
love1 = "わん！"
love2 = "わんわん♪"

[keyword]
# 変数: {word}, {reading}
