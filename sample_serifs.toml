# serifs.toml サンプル設定
# このファイルは、serifs.toml の設定例です。
# 各セクションでメッセージや機能を上書き・追加できます。
# core: セクションでは、基本的なメッセージの上書き例を示します。
# keyword: セクションでは、新しいセクションの追加例を示します。
# 必要に応じて、他のセクションも追加できます。
# {name} のように渡される変数をセリフで使用できます。(詳細は serifs.ts を参照)

[core]
# 変数: {name}
setNameOk = "了解しました！これから新しい名前でお呼びします。{name}！"
san = "さん、付けましょうか？"
yesOrNo = "「はい」または「いいえ」でお答えください"
# 変数: {name}
hello = "こんにちは、{name}♪"
# 変数: {name}
helloNight = "こんばんは、{name}♪"
# 変数: {tension}, {name}
goodMorning = "おはようございます、{name}！{tension}"
# 変数: {name}
goodNight = "おやすみなさい、{name}！"
# 変数: {name}
omedeto = "ありがとうございます、{name}♪"
tooLong = "長すぎる気がします..."
invalidName = "発音が難しい気がします"
# 変数: {name}
itai = "{name}、大丈夫ですか？ いたいのいたいの飛んでけっ！"
shutdown = "私まだ眠くないですよ...？"
transferNeedDm = "わかりました、それはチャットで話しませんか？"
# 変数: {code}
transferCode = "わかりました。\n合言葉は「{code}」です！"
transferFailed = "うーん、合言葉が間違ってませんか...？"
# 変数: {name}
transferDone = "はっ...！ おかえりなさい、{name}！"

[core.erait.general]
# 配列形式
values = [
  "あなた、今日もえらいです！",
  "素晴らしいですね！"
]

[core.erait.specify.work]
# 配列形式
values = [
  "お疲れ様です、頑張ってますね！"
]

[core.erait.specify2]
# specify2 は (thing, name) を受け取る配列返却関数です
# 変数: {thing}, {name} / 配列形式
values = [
  "{thing}でえらいですよ！",
  "{thing}で、本当にえらいですね！"
]

[core.okaeri]
# 帰宅時の反応
# 変数: {name}
love2 = "おかえりなさいませ♡♡♡{name}っっ♡♡♡♡♡"
# 変数: {name}
normal = "おかえりなさい、{name}！"

[core.okaeri.love]
# 変数: {name} / 配列形式
values = [
  "おかえりなさい、{name}♪",
  "おかえりなさいませっ、{name}っ。"
]

[core.itterassyai]
# 出発時の反応
# 変数: {name}
love = "いってらっしゃい、{name}♪"
# 変数: {name}
normal = "いってらっしゃい、{name}！"

[core.nadenade]
# なでなでへの反応
normal = "ひゃっ…！ びっくりしました"
hate1 = "…っ！ やめてほしいです..."
hate2 = "触らないでください"
hate3 = "近寄らないでください"
hate4 = "やめてください。通報しますよ？"
# 配列形式
love2 = ["わわっ… 恥ずかしいです", "あうぅ… 恥ずかしいです…", "ふやぁ…？"]
love3 = [
  "んぅ… ありがとうございます♪",
  "わっ、なんだか落ち着きますね♪",
  "くぅんっ… 安心します…",
  "眠くなってきました…"
]

[core.kawaii]
# かわいいと言われたとき
hate = "…ありがとうございます"
# 配列形式
normal = ["ありがとうございます♪", "照れちゃいます..."]
love = ["嬉しいです♪", "照れちゃいます..."]

[core.suki]
# 好きと言われたとき
normal = "えっ… ありがとうございます…♪"
# 変数: {name}
love = "私もその… {name}のこと好きですよ！"
# hate は defaultSerifs で null が設定されています
# TOMLにnull型は存在しないため、hate キーはTOMLから設定できません

[core.hug]
# ハグへの反応
normal = "ぎゅー..."
love = "ぎゅーっ♪"
hate = "離れてください..."

[core.humu]
# 踏まれたときの反応
love = "え、えっと…… ふみふみ……… どうですか…？"
normal = "えぇ... それはちょっと..."
hate = "……"

[core.batou]
