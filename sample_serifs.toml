alreadyStarted = "え、ゲームは既に始まってますよ！"
plzDm = "メッセージでやりましょう！"
started = "0~100の秘密の数を当ててみてください♪"
nan = "数字でお願いします！「やめる」と言ってゲームをやめることもできますよ！"
cancel = "わかりました～。ありがとうございました♪"
# 変数: {num}
grater = "{num}より大きいですね"
graterAgain = "もう一度言いますが{num}より大きいですよ！"
less = "{num}より小さいですね"
lessAgain = "もう一度言いますが{num}より小さいですよ！"
# 変数: {tries}
congrats = "正解です🎉 ({tries}回目で当てました)"

[kazutori]
# 数取りゲームへの反応
alreadyStarted = "今ちょうどやってますよ～"
matakondo = "また今度やりましょう！"
# 変数: {minutes}
intro = "みなさん、数取りゲームしましょう！\n0~100の中で最も大きい数字を取った人が勝ちです。他の人と被ったらだめですよ～\n制限時間は{minutes}分です。数字はこの投稿にリプライで送ってくださいね！"
finish = "ゲームの結果発表です！"
# 変数: {user}, {name}
finishWithWinner = "今回は{user}さん（{name}）の勝ちです！またやりましょう♪"
finishWithNoWinner = "今回は勝者はいませんでした... またやりましょう♪"
onagare = "参加者が集まらなかったのでお流れになりました..."

[emoji]
# 変数: {emoji}
suggest = "こんなのはどうですか？→{emoji}"

[fortune]
# 占いの結果通知
# 変数: {name}
cw = "私が今日の{name}の運勢を占いました..."

[timer]
# タイマーへの反応
set = "わかりました！"
invalid = "うーん...？"
tooLong = "長すぎます…"
# 変数: {time}, {name}
notify = "{name}、{time}経ちましたよ！"

[reminder]
# リマインダーへの反応
invalid = "うーん...？"
doneFromInvalidUser = "イタズラはめっですよ！"
reminds = "やること一覧です！"
# 変数: {name}
notify = "{name}、これやりましたか？"
# 変数: {thing}, {name}
notifyWithThing = "{name}、「{thing}」やりましたか？"
cancel = "わかりました。"

[reminder.done]
# 変数: {name} / 配列形式
values = [
  "よく出来ました、{name}♪",
  "{name}、さすがですっ！",
  "{name}、えらすぎます...！"
]

[valentine]
# バレンタインの反応
# 変数: {name}
